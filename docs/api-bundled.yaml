openapi: 3.1.1
info:
  title: universe products API
  description: API documentation for universe products service
  version: 0.1.0
servers:
  - url: 'http://localhost:8001'
paths:
  /products:
    post:
      tags:
        - products
      summary: Create a new product
      description: Endpoint to create a new product.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProduct'
      responses:
        '201':
          description: Product successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          description: Bad request - invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
    get:
      tags:
        - products
      summary: Get products
      description: 'Endpoint to retrieve a list of products with filtering, sorting and pagination.'
      parameters:
        - in: query
          name: 'page[limit]'
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Max number of items to return
        - in: query
          name: 'page[offset]'
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Number of items to skip
        - in: query
          name: 'filter[name]'
          required: false
          schema:
            type: string
          description: Filter by product name (partial match)
        - in: query
          name: 'filter[price][gte]'
          required: false
          schema:
            type: number
            format: double
            minimum: 0
          description: Filter products with price greater than or equal to this value
        - in: query
          name: 'filter[price][lte]'
          required: false
          schema:
            type: number
            format: double
            minimum: 0
          description: Filter products with price less than or equal to this value
        - in: query
          name: 'filter[created_at][gte]'
          required: false
          schema:
            type: string
            format: date-time
          description: Filter products created at or after this timestamp (RFC3339)
          example: '2024-01-01T00:00:00Z'
        - in: query
          name: 'filter[created_at][lte]'
          required: false
          schema:
            type: string
            format: date-time
          description: Filter products created at or before this timestamp (RFC3339)
          example: '2024-12-31T23:59:59Z'
        - in: query
          name: sort
          required: false
          schema:
            type: string
            enum:
              - price
              - '-price'
              - created_at
              - '-created_at'
            default: '-created_at'
          description: |
            Sort field and direction. Prefix `-` means descending order. Example: `sort=price` (cheapest first), `sort=-price` (most expensive first)
      responses:
        '200':
          description: A list of products
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductsCollection'
        '400':
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
  '/products/{product_id}':
    parameters:
      - in: path
        name: product_id
        required: true
        schema:
          type: string
          format: uuid
        description: product ID
    delete:
      tags:
        - products
      summary: Delete a product
      description: Endpoint to delete a product by its ID.
      responses:
        '204':
          description: Product successfully deleted
        '400':
          description: Bad request - invalid product ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
components:
  schemas:
    Errors:
      description: 'Standard JSON:API error'
      type: object
      required:
        - errors
      properties:
        errors:
          type: array
          description: Non empty array of errors occurred during request processing
          items:
            type: object
            required:
              - title
              - status
            properties:
              title:
                type: string
                description: 'Title is a short, human-readable summary of the problem'
                example: Bad Request
              detail:
                type: string
                description: Detail is a human-readable explanation specific to this occurrence of the problem
                example: Request body was expected
              status:
                type: integer
                description: Status is the HTTP status code applicable to this problem
                example: 400
                enum:
                  - 400
                  - 401
                  - 403
                  - 404
                  - 409
                  - 500
    Product:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/ProductData'
    ProductsCollection:
      type: object
      required:
        - data
        - links
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ProductData'
        links:
          $ref: '#/components/schemas/PaginationData'
    PaginationData:
      type: object
      required:
        - self
      properties:
        self:
          type: string
          format: uri
          description: link to the current page
        first:
          type: string
          format: uri
          description: link to the first page
        last:
          type: string
          format: uri
          description: link to the last page
        prev:
          type: string
          format: uri
          description: link to the previous page
        next:
          type: string
          format: uri
          description: link to the next page
    ProductData:
      type: object
      required:
        - id
        - type
        - attributes
      properties:
        id:
          type: string
          format: uuid
          description: product ID
        type:
          type: string
          enum:
            - product
        attributes:
          type: object
          required:
            - name
            - price
            - created_at
          properties:
            name:
              type: string
              description: The name of the product
            price:
              type: number
              format: double
              description: The price of the product
            created_at:
              type: string
              format: date-time
              description: The date and time when the product was created
    CreateProduct:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - type
            - attributes
          properties:
            type:
              type: string
              enum:
                - product
            attributes:
              type: object
              required:
                - name
                - price
              properties:
                name:
                  type: string
                  description: The name of the product
                price:
                  type: number
                  format: double
                  description: The price of the product
