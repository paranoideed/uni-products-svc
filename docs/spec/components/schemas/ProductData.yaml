type: object
required:
  - id
  - type
  - attributes
properties:
  id:
    type: string
    format: uuid
    description: "product ID"
  type:
    type: string
    enum: [ product ]
  attributes:
    type: object
    required:
      - name
      - price
      - created_at
    properties:
      name:
        type: string
        description: "The name of the product"
      price:
        type: number
        format: double
        description: "The price of the product"
      created_at:
        type: string
        format: date-time
        description: "The date and time when the product was created"