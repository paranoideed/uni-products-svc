post:
  tags:
    - products
  summary: Create a new product
  description: Endpoint to create a new product.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/CreateProduct.yaml'
  responses:
    '201':
      description: Product successfully created
      content:
        application/json:
          schema:
            $ref: '../components/schemas/Product.yaml'
    '400':
      description: Bad request - invalid input data
      content:
        application/json:
          schema:
            $ref: '../components/responses/Errors.yaml'
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '../components/responses/Errors.yaml'

get:
  tags:
    - products
  summary: Get products
  description: Endpoint to retrieve a list of products with filtering, sorting and pagination.
  parameters:
    - in: query
      name: page[limit]
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Max number of items to return

    - in: query
      name: page[offset]
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
      description: Number of items to skip

    - in: query
      name: filter[name]
      required: false
      schema:
        type: string
      description: Filter by product name (partial match)

    - in: query
      name: filter[price][gte]
      required: false
      schema:
        type: number
        format: float
        minimum: 0
      description: Filter products with price greater than or equal to this value

    - in: query
      name: filter[price][lte]
      required: false
      schema:
        type: number
        format: float
        minimum: 0
      description: Filter products with price less than or equal to this value

    - in: query
      name: filter[created_at][gte]
      required: false
      schema:
        type: string
        format: date-time
      description: Filter products created at or after this timestamp (RFC3339)
      example: "2024-01-01T00:00:00Z"

    - in: query
      name: filter[created_at][lte]
      required: false
      schema:
        type: string
        format: date-time
      description: Filter products created at or before this timestamp (RFC3339)
      example: "2024-12-31T23:59:59Z"

    - in: query
      name: sort
      required: false
      schema:
        type: string
        enum:
          - price
          - -price
          - created_at
          - -created_at
        default: -created_at
      description: >
        Sort field and direction. Prefix `-` means descending order.
        Example: `sort=price` (cheapest first), `sort=-price` (most expensive first)

  responses:
    '200':
      description: A list of products
      content:
        application/json:
          schema:
            $ref: '../components/schemas/ProductsCollection.yaml'
    '400':
      description: Invalid query parameters
      content:
        application/json:
          schema:
            $ref: '../components/responses/Errors.yaml'
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '../components/responses/Errors.yaml'
